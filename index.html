        * {

        }

        body {

            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;

            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;

        }

        .nav {
            background: #34495e;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-item {
            color: white;
            padding: 15px 30px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-size: 1em;
        }

        .nav-item:hover, .nav-item.active {
            background: #2980b9;
            border-bottom: 3px solid #f39c12;
        }

        .content {
            padding: 40px;
            min-height: 600px;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .data-table th {
            background: #34495e;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin: 30px 0;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .stat-card h4 {
            font-size: 1.2em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .alert-info {
            background: #d1ecf1;
            border-left: 5px solid #3498db;
            color: #0c5460;
        }

        .form-group {
            margin: 20px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .tab-container {
            margin-top: 20px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .tab-btn {
            padding: 12px 24px;
            background: #ecf0f1;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            color: #2c3e50;
        }

        .tab-btn.active {
            background: #3498db;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .nav {
                flex-direction: column;
            }
            
            .content {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .tab-buttons {
                flex-direction: column;
            }
        }
    </style><!--pnid:PqxQY9wNrcdFar2ZctBCj3-->

    <script data-page-node-id="UouGKthP2YTsTlZJONcZJ9" data-pnid-children="sbbmYtSXWrKcXrxCshpItM">
        // 数据存储
        let inspectionData = [];

        // 页面加载时初始化
        window.onload = function() {
            // 设置默认日期为今天
            document.getElementById('inspectionDate').valueAsDate = new Date();
            
            // 加载本地存储的数据
            loadData();
            
            // 更新统计
            updateStatistics();
        };

        // 导航切换
        function showSection(sectionId) {
            const sections = document.querySelectorAll('.section');
            sections.forEach(s => s.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Tab切换
        function showTab(tabId) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // 手动录入表单提交
        document.getElementById('manualEntryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                id: Date.now(),
                vehicleId: document.getElementById('vehicleId').value,
                inspectionDate: document.getElementById('inspectionDate').value,
                mp11: parseFloat(document.getElementById('mp11').value),
                mp12: parseFloat(document.getElementById('mp12').value),
                mp21: parseFloat(document.getElementById('mp21').value),
                mp22: parseFloat(document.getElementById('mp22').value),
                mileage: parseInt(document.getElementById('mileage').value),
                inspector: document.getElementById('inspector').value,
                timestamp: new Date().toISOString()
            };

            inspectionData.push(data);
            saveData();
            updateStatistics();
            updateVehicleSelectors();
            
            alert('数据保存成功！');
            this.reset();
            document.getElementById('inspectionDate').valueAsDate = new Date();
        });

        // 生成分析
        function generateAnalysis() {
            if (inspectionData.length === 0) {
                alert('暂无数据，请先录入检测数据！');
                return;
            }

            const selectedVehicle = document.getElementById('analysisVehicle').value;
            let dataToShow = inspectionData;
            
            if (selectedVehicle !== 'all') {
                dataToShow = inspectionData.filter(d => d.vehicleId === selectedVehicle);
            }

            document.getElementById('analysisEmpty').style.display = 'none';
            document.getElementById('analysisResult').style.display = 'block';

            const ctx = document.getElementById('wearChart').getContext('2d');
            
            if (window.wearChartInstance) {
                window.wearChartInstance.destroy();
            }

            const labels = dataToShow.map(d => `${d.vehicleId} - ${d.inspectionDate}`);
            const mp11Data = dataToShow.map(d => d.mp11);
            const mp12Data = dataToShow.map(d => d.mp12);
            const mp21Data = dataToShow.map(d => d.mp21);
            const mp22Data = dataToShow.map(d => d.mp22);

            window.wearChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'MP1-1',
                            data: mp11Data,
                            backgroundColor: 'rgba(52, 152, 219, 0.7)',
                            borderColor: 'rgb(52, 152, 219)',
                            borderWidth: 2
                        },
                        {
                            label: 'MP1-2',
                            data: mp12Data,
                            backgroundColor: 'rgba(46, 204, 113, 0.7)',
                            borderColor: 'rgb(46, 204, 113)',
                            borderWidth: 2
                        },
                        {
                            label: 'MP2-1',
                            data: mp21Data,
                            backgroundColor: 'rgba(155, 89, 182, 0.7)',
                            borderColor: 'rgb(155, 89, 182)',
                            borderWidth: 2
                        },
                        {
                            label: 'MP2-2',
                            data: mp22Data,
                            backgroundColor: 'rgba(241, 196, 15, 0.7)',
                            borderColor: 'rgb(241, 196, 15)',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '各测点厚度对比'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '厚度 (mm)'
                            }
                        }
                    }
                }
            });
        }

        // 筛选历史记录
        function filterHistory() {
            displayHistoryData();
        }

        // 显示历史记录
        function displayHistoryData() {
            if (inspectionData.length === 0) {
                document.getElementById('historyEmpty').style.display = 'block';
                document.getElementById('historyTable').style.display = 'none';
                return;
            }

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const vehicle = document.getElementById('filterVehicle').value;

            let filtered = inspectionData;

            if (startDate) {
                filtered = filtered.filter(d => d.inspectionDate >= startDate);
            }
            if (endDate) {
                filtered = filtered.filter(d => d.inspectionDate <= endDate);
            }
            if (vehicle !== 'all') {
                filtered = filtered.filter(d => d.vehicleId === vehicle);
            }

            if (filtered.length === 0) {
                document.getElementById('historyEmpty').style.display = 'block';
                document.getElementById('historyTable').style.display = 'none';
                return;
            }

            document.getElementById('historyEmpty').style.display = 'none';
            document.getElementById('historyTable').style.display = 'block';

            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            filtered.forEach((data, index) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${data.inspectionDate}</td>
                    <td>${data.vehicleId}</td>
                    <td>${data.mp11}</td>
                    <td>${data.mp12}</td>
                    <td>${data.mp21}</td>
                    <td>${data.mp22}</td>
                    <td>${data.mileage}</td>
                    <td>${data.inspector}</td>
                    <td>
                        <button class="btn btn-danger" style="padding: 5px 15px; font-size: 0.9em;" onclick="deleteRecord(${index})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </td>
                `;
            });
        }

        // 删除记录
        function deleteRecord(index) {
            if (confirm('确定要删除这条记录吗？')) {
                inspectionData.splice(index, 1);
                saveData();
                updateStatistics();
                displayHistoryData();
            }
        }

        // 导出CSV
        function exportHistory() {
            if (inspectionData.length === 0) {
                alert('暂无数据可导出！');
                return;
            }

            let csv = '检测日期,车辆编号,MP1-1最低点厚度(mm),MP1-2最低点厚度(mm),MP2-1最低点厚度(mm),MP2-2最低点厚度(mm),当前公里数(km),检测人员\n';
            
            inspectionData.forEach(data => {
                csv += `${data.inspectionDate},${data.vehicleId},${data.mp11},${data.mp12},${data.mp21},${data.mp22},${data.mileage},${data.inspector}\n`;
            });

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `受电弓检测数据_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();

            alert('CSV文件导出成功！');
        }

        // 更新统计
        function updateStatistics() {
            const total = inspectionData.length;
            document.getElementById('totalCount').textContent = total;
            
            if (total === 0) {
                document.getElementById('avgThickness').textContent = '0mm';
                document.getElementById('minThickness').textContent = '0mm';
                document.getElementById('vehicleCount').textContent = '0';
                updateAlerts();
                return;
            }

            const allThickness = inspectionData.flatMap(d => [d.mp11, d.mp12, d.mp21, d.mp22]);
            const avg = (allThickness.reduce((a, b) => a + b, 0) / allThickness.length).toFixed(1);
            const min = Math.min(...allThickness).toFixed(1);
            const vehicles = [...new Set(inspectionData.map(d => d.vehicleId))];

            document.getElementById('avgThickness').textContent = avg + 'mm';
            document.getElementById('minThickness').textContent = min + 'mm';
            document.getElementById('vehicleCount').textContent = vehicles.length;

            updateAlerts();
        }

        // 更新告警信息
        function updateAlerts() {
            const alertDiv = document.getElementById('alertMessages');
            
            if (inspectionData.length === 0) {
                alertDiv.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>暂无告警信息</p></div>';
                return;
            }

            let alerts = '';
            inspectionData.forEach(data => {
                const minThickness = Math.min(data.mp11, data.mp12, data.mp21, data.mp22);
                if (minThickness < 6) {
                    alerts += `
                        <div class="alert" style="background: #f8d7da; border-left: 5px solid #e74c3c; color: #721c24;">
                            <i class="fas fa-exclamation-triangle fa-2x"></i>
                            <div>
                                <strong>紧急：</strong>车辆编号 ${data.vehicleId} 碳滑条磨耗已达到更换标准（最小厚度：${minThickness}mm）
                            </div>
                        </div>
                    `;
                } else if (minThickness < 10) {
                    alerts += `
                        <div class="alert" style="background: #fff3cd; border-left: 5px solid #f39c12; color: #856404;">
                            <i class="fas fa-exclamation-circle fa-2x"></i>
                            <div>
                                <strong>预警：</strong>车辆编号 ${data.vehicleId} 碳滑条磨耗接近预警值（最小厚度：${minThickness}mm）
                            </div>
                        </div>
                    `;
                }
            });

            alertDiv.innerHTML = alerts || '<div class="empty-state"><i class="fas fa-check-circle"></i><p>暂无告警信息</p></div>';
        }

        // 更新车辆选择器
        function updateVehicleSelectors() {
            const vehicles = [...new Set(inspectionData.map(d => d.vehicleId))];
            
            const analysisSelect = document.getElementById('analysisVehicle');
            const filterSelect = document.getElementById('filterVehicle');
            
            const options = '<option value="all">全部</option>' + 
                vehicles.map(v => `<option value="${v}">${v}</option>`).join('');
            
            analysisSelect.innerHTML = options;
            filterSelect.innerHTML = options;
        }

        // 保存数据到本地存储
        function saveData() {
            localStorage.setItem('pantographData', JSON.stringify(inspectionData));
        }

        // 从本地存储加载数据
        function loadData() {
            const saved = localStorage.getItem('pantographData');
            if (saved) {
                try {
                    inspectionData = JSON.parse(saved);
                    displayHistoryData();
                    updateVehicleSelectors();
                } catch (error) {
                    console.error('加载数据失败:', error);
                }
            }
        }
    </script><!--pnid:xvFXW7m0DGoFSknWqT5Gl5-->
