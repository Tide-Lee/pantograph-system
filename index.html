    <script data-page-node-id="cvbAdpZSCKGRY94aTrtCk6" src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script><!--pnid:wrmTJ3f4n0Ogbnlt9fwj5O-->
    <script data-page-node-id="7ulk0cA3xi7EuDKSXUaBgh" data-pnid-children="JQIrieCgeqrj46oAuF1Dft">
        // Supabase 配置
        const SUPABASE_URL = 'https://jqhmrlyemftyjmxhxkrh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxaG1ybHllbWZ0eWpteGh4a3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNzU3NjMsImV4cCI6MjA5ODY1MTc2M30.WE1xSk1Sg75UV5fAjZF9ceOySZe-ZKKCG4573LHdPkI';

        // 初始化 Supabase 客户端
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 数据存储
        let inspectionData = [];
        let wearChartInstance = null;

        // Toast 提示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = isError ? 'toast error' : 'toast';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // 页面加载时初始化
        window.onload = function() {
            document.getElementById('inspectionDate').valueAsDate = new Date();
            loadData();
        };

        // 加载数据
        async function loadData() {
            try {
                const { data, error } = await supabase
                    .from('pantograph_data')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                inspectionData = data || [];
                updateStatus(true);
                updateStatistics();
                displayHistoryData();
            } catch (error) {
                console.error('加载数据失败:', error);
                updateStatus(false);
                showToast('数据加载失败，请检查网络连接', true);
            }
        }

        // 更新连接状态
        function updateStatus(online) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            if (online) {
                indicator.className = 'status-indicator online';
                text.textContent = '已连接';
            } else {
                indicator.className = 'status-indicator offline';
                text.textContent = '离线';
            }
        }

        // 导航切换
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            
            if (id === 'analysis' && inspectionData.length > 0) {
                generateAnalysis();
            }
        }

        // 表单提交
        document.getElementById('manualEntryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                vehicle_id: document.getElementById('vehicleId').value,
                inspection_date: document.getElementById('inspectionDate').value,
                mp11: parseFloat(document.getElementById('mp11').value),
                mp12: parseFloat(document.getElementById('mp12').value),
                mp21: parseFloat(document.getElementById('mp21').value),
                mp22: parseFloat(document.getElementById('mp22').value),
                mileage: parseInt(document.getElementById('mileage').value),
                inspector: document.getElementById('inspector').value
            };

            try {
                const { error } = await supabase
                    .from('pantograph_data')
                    .insert([data]);

                if (error) throw error;

                showToast('保存成功！');
                this.reset();
                document.getElementById('inspectionDate').valueAsDate = new Date();
                await loadData();
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败: ' + error.message, true);
            }
        });

        // 更新统计
        function updateStatistics() {
            document.getElementById('totalCount').textContent = inspectionData.length;
            document.getElementById('recordCount').textContent = `共 ${inspectionData.length} 条记录`;
            
            if (inspectionData.length > 0) {
                const all = inspectionData.flatMap(d => [d.mp11, d.mp12, d.mp21, d.mp22]);
                document.getElementById('avgThickness').textContent = (all.reduce((a,b)=>a+b,0)/all.length).toFixed(1) + 'mm';
                document.getElementById('minThickness').textContent = Math.min(...all).toFixed(1) + 'mm';
                document.getElementById('vehicleCount').textContent = [...new Set(inspectionData.map(d=>d.vehicle_id))].length;
            } else {
                document.getElementById('avgThickness').textContent = '0mm';
                document.getElementById('minThickness').textContent = '0mm';
                document.getElementById('vehicleCount').textContent = '0';
            }
        }

        // 显示历史记录
        function displayHistoryData() {
            if (inspectionData.length === 0) {
                document.getElementById('historyEmpty').style.display = 'block';
                document.getElementById('historyTable').style.display = 'none';
                return;
            }

            document.getElementById('historyEmpty').style.display = 'none';
            document.getElementById('historyTable').style.display = 'block';

            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            inspectionData.forEach(data => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${data.inspection_date}</td>
                    <td>${data.vehicle_id}</td>
                    <td>${data.mp11}</td>
                    <td>${data.mp12}</td>
                    <td>${data.mp21}</td>
                    <td>${data.mp22}</td>
                    <td>${data.mileage}</td>
                    <td>${data.inspector}</td>
                    <td>
                        <button class="btn btn-danger" style="padding: 5px 15px; font-size: 0.9em;" onclick="deleteRecord(${data.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </td>
                `;
            });
        }

        // 删除记录
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;

            try {
                const { error } = await supabase
                    .from('pantograph_data')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showToast('删除成功！');
                await loadData();
            } catch (error) {
                console.error('删除失败:', error);
                showToast('删除失败: ' + error.message, true);
            }
        }

        // 生成分析图表
        function generateAnalysis() {
            if (inspectionData.length === 0) {
                document.getElementById('analysisEmpty').style.display = 'block';
                document.getElementById('analysisResult').style.display = 'none';
                return;
            }

            document.getElementById('analysisEmpty').style.display = 'none';
            document.getElementById('analysisResult').style.display = 'block';

            const ctx = document.getElementById('wearChart').getContext('2d');
            
            if (wearChartInstance) {
                wearChartInstance.destroy();
            }

            const labels = inspectionData.map(d => `${d.vehicle_id} - ${d.inspection_date}`);
            const mp11Data = inspectionData.map(d => d.mp11);
            const mp12Data = inspectionData.map(d => d.mp12);
            const mp21Data = inspectionData.map(d => d.mp21);
            const mp22Data = inspectionData.map(d => d.mp22);

            wearChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'MP1-1', data: mp11Data, backgroundColor: 'rgba(52, 152, 219, 0.7)', borderColor: 'rgb(52, 152, 219)', borderWidth: 2 },
                        { label: 'MP1-2', data: mp12Data, backgroundColor: 'rgba(46, 204, 113, 0.7)', borderColor: 'rgb(46, 204, 113)', borderWidth: 2 },
                        { label: 'MP2-1', data: mp21Data, backgroundColor: 'rgba(155, 89, 182, 0.7)', borderColor: 'rgb(155, 89, 182)', borderWidth: 2 },
                        { label: 'MP2-2', data: mp22Data, backgroundColor: 'rgba(241, 196, 15, 0.7)', borderColor: 'rgb(241, 196, 15)', borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { title: { display: true, text: '各测点厚度对比' } },
                    scales: { y: { beginAtZero: false, title: { display: true, text: '厚度 (mm)' } } }
                }
            });
        }
    </script><!--pnid:339vSf0j3kHindGDZrdMwd-->
